services:
  - type: worker
    name: osint-news-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: AUTOPOST_CHANNEL
        value: "False"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openrouter/free
      - key: NEWS_CACHE_REFRESH_SECONDS
        value: "300"
      - key: RSS_TIMEOUT_SECONDS
        value: "10"
